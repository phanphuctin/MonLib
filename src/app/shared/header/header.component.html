<header class="header">
  <div class="header-left">
    <span class="logo">📚 Library</span>
  </div>
  <div class="header-right">
    <div class="theme-toggle" role="group" aria-label="Theme switcher">
      <i class="pi pi-sun theme-icon" aria-hidden="true"></i>
      <p-toggleswitch
        [ngModel]="themeService.isDarkMode()"
        (ngModelChange)="onThemeToggle($event)"
        [ariaLabel]="themeService.isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
      />
      <i class="pi pi-moon theme-icon" aria-hidden="true"></i>
    </div>
    <i class="pi pi-cog settings-icon" aria-hidden="true"></i>
    <span class="avatar">
      <img src="https://i.pravatar.cc/32" alt="User Avatar" />
    </span>
  </div>
</header>
